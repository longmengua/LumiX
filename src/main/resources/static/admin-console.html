<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Console</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #eef2f7;
            --panel: #ffffff;
            --line: #d4dee9;
            --text: #162032;
            --muted: #647386;
            --accent: #0a8f7b;
            --brand: #19233a;
            --brand-2: #263757;
            --shadow: 0 14px 40px rgba(26, 37, 56, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, #f8fafc 0, var(--bg) 260px);
            color: var(--text);
            font-family: Inter, Arial, Helvetica, sans-serif;
            font-size: 14px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            color: white;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
        }

        h1 {
            margin: 0;
            font-size: 21px;
        }

        .subtitle {
            color: #c5d0de;
            font-size: 12px;
            margin-top: 4px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .nav-link {
            min-height: 34px;
            display: inline-flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.10);
            padding: 0 12px;
            font-weight: 700;
        }

        .header-actions {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-end;
        }

        .language-field {
            align-items: center;
            display: flex;
            gap: 8px;
        }

        .language-field label {
            color: #c5d0de;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        select {
            min-height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.10);
            color: #fff;
            padding: 0 10px;
        }

        option {
            color: var(--text);
        }

        main {
            padding: 16px 24px 24px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .tab {
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #fff;
            color: var(--muted);
            cursor: pointer;
            font-weight: 800;
            min-height: 38px;
            padding: 0 14px;
            white-space: nowrap;
        }

        .tab[aria-selected="true"] {
            border-color: var(--accent);
            background: #e0f6f2;
            color: #086c61;
        }

        .frame-shell {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
            min-height: calc(100vh - 132px);
        }

        iframe {
            border: 0;
            display: block;
            height: calc(100vh - 132px);
            min-height: 720px;
            width: 100%;
        }

        @media (max-width: 760px) {
            header {
                align-items: flex-start;
                flex-direction: column;
            }

            main {
                padding: 12px;
            }

            iframe {
                height: calc(100vh - 166px);
            }
        }
    </style>
</head>
<body>
<!-- This page consolidates privileged MVP tools while preserving the older direct admin URLs for tests/bookmarks. -->
<header>
    <div>
        <h1 data-i18n="page.title">Admin Console</h1>
        <div class="subtitle" data-i18n="page.subtitle">Operator tools grouped as tabs: test funds, market config, risk parameters, market makers, and DLQ.</div>
    </div>
    <div class="header-actions">
        <div class="language-field">
            <label for="language" data-i18n="language.label">Language</label>
            <select id="language" aria-label="Language">
                <option value="en">English</option>
                <option value="zh-TW">中文</option>
                <option value="ms">Bahasa Malaysia</option>
                <option value="ko">한국어</option>
            </select>
        </div>
        <a class="nav-link" href="/exchange.html" data-i18n="nav.clientExchange">Client Exchange</a>
    </div>
</header>

<main>
    <nav class="tabs" aria-label="Admin sections">
        <button class="tab" type="button" data-src="/admin-test-funds.html" data-i18n="tab.testFunds" aria-selected="true">Test Funds</button>
        <button class="tab" type="button" data-src="/admin-market-config.html" data-i18n="tab.marketConfig" aria-selected="false">Market Config</button>
        <button class="tab" type="button" data-src="/admin-risk-parameters.html" data-i18n="tab.riskParameters" aria-selected="false">Risk Parameters</button>
        <button class="tab" type="button" data-src="/exchange-admin.html?embed=1" data-i18n="tab.marketMakers" aria-selected="false">Market Makers</button>
        <button class="tab" type="button" data-src="/admin-dlq.html" data-i18n="tab.dlq" aria-selected="false">DLQ</button>
    </nav>
    <section class="frame-shell" data-i18n-aria-label="section.selectedAdminPage" aria-label="Selected admin page">
        <iframe id="adminFrame" title="Admin Test Funds" src="/admin-test-funds.html"></iframe>
    </section>
</main>

<script>
    // Tabs are a thin shell over existing admin pages so each tool keeps its own focused API and tests.
    const I18N_STORAGE_KEY = 'exchangeLanguage';
    const translations = {
        en: {
            'page.title': 'Admin Console',
            'page.subtitle': 'Operator tools grouped as tabs: test funds, market config, risk parameters, market makers, and DLQ.',
            'language.label': 'Language',
            'nav.clientExchange': 'Client Exchange',
            'tab.testFunds': 'Test Funds',
            'tab.marketConfig': 'Market Config',
            'tab.riskParameters': 'Risk Parameters',
            'tab.marketMakers': 'Market Makers',
            'tab.dlq': 'DLQ',
            'section.selectedAdminPage': 'Selected admin page',
            'title.adminTestFunds': 'Admin Test Funds',
            'title.adminMarketConfig': 'Admin Market Config',
            'title.adminRiskParameters': 'Admin Risk Parameters',
            'title.adminMarketMaker': 'Admin Market Maker',
            'title.adminDlq': 'Admin DLQ'
        },
        'zh-TW': {
            'page.title': '後台管理',
            'page.subtitle': '營運工具以分頁管理：測試資金、市場設定、風控參數、做市商與 DLQ。',
            'language.label': '語言',
            'nav.clientExchange': '前台交易',
            'tab.testFunds': '測試資金',
            'tab.marketConfig': '市場設定',
            'tab.riskParameters': '風控參數',
            'tab.marketMakers': '做市商',
            'tab.dlq': 'DLQ',
            'section.selectedAdminPage': '目前選取的後台頁面',
            'title.adminTestFunds': '測試資金後台',
            'title.adminMarketConfig': '市場設定後台',
            'title.adminRiskParameters': '風控參數後台',
            'title.adminMarketMaker': '做市商後台',
            'title.adminDlq': 'DLQ 後台'
        },
        ms: {
            'page.title': 'Konsol Admin',
            'page.subtitle': 'Alat operator dikumpulkan sebagai tab: dana ujian, konfigurasi pasaran, parameter risiko, pembuat pasaran dan DLQ.',
            'language.label': 'Bahasa',
            'nav.clientExchange': 'Bursa Klien',
            'tab.testFunds': 'Dana Ujian',
            'tab.marketConfig': 'Konfigurasi Pasaran',
            'tab.riskParameters': 'Parameter Risiko',
            'tab.marketMakers': 'Pembuat Pasaran',
            'tab.dlq': 'DLQ',
            'section.selectedAdminPage': 'Halaman admin dipilih',
            'title.adminTestFunds': 'Admin Dana Ujian',
            'title.adminMarketConfig': 'Admin Konfigurasi Pasaran',
            'title.adminRiskParameters': 'Admin Parameter Risiko',
            'title.adminMarketMaker': 'Admin Pembuat Pasaran',
            'title.adminDlq': 'Admin DLQ'
        },
        ko: {
            'page.title': '관리 콘솔',
            'page.subtitle': '운영 도구를 테스트 자금, 시장 설정, 리스크 파라미터, 마켓메이커, DLQ 탭으로 묶었습니다.',
            'language.label': '언어',
            'nav.clientExchange': '클라이언트 거래소',
            'tab.testFunds': '테스트 자금',
            'tab.marketConfig': '시장 설정',
            'tab.riskParameters': '리스크 파라미터',
            'tab.marketMakers': '마켓메이커',
            'tab.dlq': 'DLQ',
            'section.selectedAdminPage': '선택한 관리 페이지',
            'title.adminTestFunds': '테스트 자금 관리',
            'title.adminMarketConfig': '시장 설정 관리',
            'title.adminRiskParameters': '리스크 파라미터 관리',
            'title.adminMarketMaker': '마켓메이커 관리',
            'title.adminDlq': 'DLQ 관리'
        }
    };
    let currentLanguage = localStorage.getItem(I18N_STORAGE_KEY) || 'en';
    const frame = document.getElementById('adminFrame');
    const titles = {
        '/admin-test-funds.html': 'title.adminTestFunds',
        '/admin-market-config.html': 'title.adminMarketConfig',
        '/admin-risk-parameters.html': 'title.adminRiskParameters',
        '/exchange-admin.html': 'title.adminMarketMaker',
        '/admin-dlq.html': 'title.adminDlq'
    };

    function t(key) {
        return translations[currentLanguage]?.[key] || translations.en[key] || key;
    }

    function selectedTab() {
        return document.querySelector('.tab[aria-selected="true"]');
    }

    function titleKeyFor(src) {
        // Embedded admin tools may include query flags; title routing is keyed by the stable page path.
        return titles[new URL(src, window.location.origin).pathname] || 'page.title';
    }

    function applyTranslations() {
        document.documentElement.lang = currentLanguage;
        document.title = t('page.title');
        document.querySelectorAll('[data-i18n]').forEach((el) => {
            el.textContent = t(el.dataset.i18n);
        });
        document.querySelectorAll('[data-i18n-aria-label]').forEach((el) => {
            el.setAttribute('aria-label', t(el.dataset.i18nAriaLabel));
        });
        const src = selectedTab()?.dataset.src || frame.getAttribute('src');
        frame.title = t(titleKeyFor(src));
    }

    function syncFrameLanguage() {
        // The admin shell and same-origin child pages share the language key so iframe reloads keep operator locale.
        localStorage.setItem(I18N_STORAGE_KEY, currentLanguage);
        frame.src = frame.getAttribute('src');
    }

    document.querySelectorAll('.tab').forEach((tab) => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach((candidate) => {
                candidate.setAttribute('aria-selected', String(candidate === tab));
            });
            const src = tab.dataset.src;
            frame.src = src;
            frame.title = t(titleKeyFor(src));
        });
    });

    document.getElementById('language').value = currentLanguage;
    document.getElementById('language').addEventListener('change', (event) => {
        currentLanguage = event.target.value;
        applyTranslations();
        syncFrameLanguage();
    });
    applyTranslations();
</script>
</body>
</html>
