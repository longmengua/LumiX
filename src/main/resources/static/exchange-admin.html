<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Exchange Admin</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #eef2f7;
            --panel: #ffffff;
            --line: #d4dee9;
            --text: #162032;
            --muted: #647386;
            --accent: #0a8f7b;
            --brand: #19233a;
            --brand-2: #263757;
            --shadow: 0 14px 40px rgba(26, 37, 56, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, #f8fafc 0, var(--bg) 260px);
            color: var(--text);
            font-family: Inter, Arial, Helvetica, sans-serif;
            font-size: 14px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            color: white;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
        }

        h1 {
            margin: 0;
            font-size: 21px;
        }

        .subtitle {
            color: #c5d0de;
            font-size: 12px;
            margin-top: 4px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .nav-link {
            min-height: 34px;
            display: inline-flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.10);
            padding: 0 12px;
            font-weight: 700;
        }

        .message-center {
            position: relative;
        }

        .message-center-toggle {
            min-height: 34px;
            min-width: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.10);
            color: #fff;
            cursor: pointer;
            position: relative;
        }

        .message-center-toggle svg {
            height: 18px;
            width: 18px;
        }

        .message-badge {
            align-items: center;
            background: #f05252;
            border: 2px solid var(--brand-2);
            border-radius: 999px;
            color: #fff;
            display: inline-flex;
            font-size: 10px;
            font-weight: 800;
            height: 18px;
            justify-content: center;
            min-width: 18px;
            padding: 0 4px;
            position: absolute;
            right: -7px;
            top: -7px;
        }

        .message-badge[hidden] {
            display: none;
        }

        .message-panel {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            color: var(--text);
            max-height: min(420px, calc(100vh - 92px));
            overflow: hidden;
            padding: 12px;
            position: absolute;
            right: 0;
            top: calc(100% + 10px);
            width: min(360px, calc(100vw - 32px));
            z-index: 50;
        }

        .message-panel h2 {
            font-size: 14px;
            margin: 0 0 10px;
        }

        .message-list {
            display: grid;
            gap: 8px;
            max-height: 330px;
            overflow: auto;
        }

        .message-item {
            align-items: start;
            background: #f7f9fc;
            border: 1px solid #e5ebf2;
            border-radius: 8px;
            display: grid;
            gap: 8px;
            grid-template-columns: 1fr auto;
            padding: 9px;
        }

        .message-item small {
            color: var(--muted);
            display: block;
            margin-top: 3px;
        }

        .message-item button {
            min-height: 24px;
            min-width: 24px;
            border: 0;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            padding: 0;
        }

        .message-empty {
            color: var(--muted);
            padding: 12px 4px;
        }

        .header-actions {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-end;
        }

        .language-field {
            align-items: center;
            display: flex;
            gap: 8px;
        }

        .language-field label {
            color: #c5d0de;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        select {
            min-height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.10);
            color: #fff;
            padding: 0 10px;
        }

        option {
            color: var(--text);
        }

        main {
            padding: 16px 24px 24px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .tab {
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #fff;
            color: var(--muted);
            cursor: pointer;
            font-weight: 800;
            min-height: 38px;
            padding: 0 14px;
            white-space: nowrap;
        }

        .tab[aria-selected="true"] {
            border-color: var(--accent);
            background: #e0f6f2;
            color: #086c61;
        }

        .frame-shell {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
            min-height: calc(100vh - 132px);
        }

        iframe {
            border: 0;
            display: block;
            height: calc(100vh - 132px);
            min-height: 720px;
            width: 100%;
        }

        @media (max-width: 760px) {
            header {
                align-items: flex-start;
                flex-direction: column;
            }

            main {
                padding: 12px;
            }

            iframe {
                height: calc(100vh - 166px);
            }
        }
    </style>
</head>
<body>
<!-- This page consolidates privileged MVP tools while preserving the older direct admin URLs for tests/bookmarks. -->
<header>
    <div>
        <h1 data-i18n="page.title">Exchange Admin</h1>
        <div class="subtitle" data-i18n="page.subtitle">Unified operator console for funding, markets, risk, market making, and DLQ review.</div>
    </div>
    <div class="header-actions">
        <div class="language-field">
            <label for="language" data-i18n="language.label">Language</label>
            <select id="language" aria-label="Language">
                <option value="en">🇺🇸 English</option>
                <option value="zh-TW">🇹🇼 中文</option>
                <option value="ms">🇲🇾 Bahasa Malaysia</option>
                <option value="ko">🇰🇷 한국어</option>
            </select>
        </div>
        <a class="nav-link" href="/exchange.html" data-i18n="nav.clientExchange">Client Exchange</a>
        <!-- Shell-level notifications stay outside iframe pages so every admin module shares one message center. -->
        <div id="messageCenter" class="message-center">
            <button id="messageCenterToggle" type="button" class="message-center-toggle" data-i18n-aria-label="message.open" data-i18n-title="message.open" aria-label="Open Messages" title="Open Messages" aria-expanded="false">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M4 6.75A2.75 2.75 0 0 1 6.75 4h10.5A2.75 2.75 0 0 1 20 6.75v7.5A2.75 2.75 0 0 1 17.25 17H9.6l-3.5 2.7A1 1 0 0 1 4.5 18.9V17.5A2.75 2.75 0 0 1 2 14.75v-8ZM6.75 6A.75.75 0 0 0 6 6.75v8A.75.75 0 0 0 6.75 15H7.5a1 1 0 0 1 1 1v.86l2.13-1.64A1 1 0 0 1 11.24 15h6.01a.75.75 0 0 0 .75-.75v-7.5a.75.75 0 0 0-.75-.75H6.75Z" fill="currentColor"/>
                </svg>
                <span id="messageBadge" class="message-badge" hidden>0</span>
            </button>
            <section id="messagePanel" class="message-panel" hidden>
                <h2 data-i18n="message.title">Messages</h2>
                <div id="messageList" class="message-list"></div>
            </section>
        </div>
    </div>
</header>

<main>
    <nav class="tabs" aria-label="Admin sections">
        <button class="tab" type="button" data-src="/admin-test-funds.html?embed=1" data-i18n="tab.testFunds" aria-selected="true">Test Funds</button>
        <button class="tab" type="button" data-src="/admin-market-config.html?embed=1" data-i18n="tab.marketConfig" aria-selected="false">Market Config</button>
        <button class="tab" type="button" data-src="/admin-risk-parameters.html?embed=1" data-i18n="tab.riskParameters" aria-selected="false">Risk Parameters</button>
        <button class="tab" type="button" data-src="/admin-market-maker.html?embed=1" data-i18n="tab.marketMakers" aria-selected="false">Market Makers</button>
        <button class="tab" type="button" data-src="/admin-dlq.html?embed=1" data-i18n="tab.dlq" aria-selected="false">DLQ</button>
    </nav>
    <section class="frame-shell" data-i18n-aria-label="section.selectedAdminPage" aria-label="Selected admin page">
        <iframe id="adminFrame" title="Admin Test Funds" src="/admin-test-funds.html?embed=1"></iframe>
    </section>
</main>

<script>
    // Tabs are a thin shell over existing admin pages so each tool keeps its own focused API and tests.
    const I18N_STORAGE_KEY = 'exchangeLanguage';
    const ADMIN_TAB_STORAGE_KEY = 'exchangeAdminSelectedSrc';
    const ADMIN_MESSAGE_STORAGE_KEY = 'exchangeAdminMessages';
    const ADMIN_MESSAGE_TTL_MS = 24 * 60 * 60 * 1000;
    const ADMIN_MESSAGE_MAX_VISIBLE = 10;
    const translations = {
        en: {
            'page.title': 'Exchange Admin',
            'page.subtitle': 'Unified operator console for funding, markets, risk, market making, and DLQ review.',
            'language.label': 'Language',
            'nav.clientExchange': 'Client Exchange',
            'tab.testFunds': 'Test Funds',
            'tab.marketConfig': 'Market Config',
            'tab.riskParameters': 'Risk Parameters',
            'tab.marketMakers': 'Market Makers',
            'tab.dlq': 'DLQ',
            'section.selectedAdminPage': 'Selected admin page',
            'title.adminTestFunds': 'Admin Test Funds',
            'title.adminMarketConfig': 'Admin Market Config',
            'title.adminRiskParameters': 'Admin Risk Parameters',
            'title.adminMarketMaker': 'Admin Market Maker',
            'title.adminDlq': 'Admin DLQ',
            'message.open': 'Open Messages',
            'message.title': 'Messages',
            'message.empty': 'No messages in the last 24 hours.',
            'message.close': 'Close message'
        },
        'zh-TW': {
            'page.title': '交易所後台',
            'page.subtitle': '統一管理測試資金、市場、風控、做市與 DLQ 審查。',
            'language.label': '語言',
            'nav.clientExchange': '前台交易',
            'tab.testFunds': '測試資金',
            'tab.marketConfig': '市場設定',
            'tab.riskParameters': '風控參數',
            'tab.marketMakers': '做市商',
            'tab.dlq': 'DLQ',
            'section.selectedAdminPage': '目前選取的後台頁面',
            'title.adminTestFunds': '測試資金後台',
            'title.adminMarketConfig': '市場設定後台',
            'title.adminRiskParameters': '風控參數後台',
            'title.adminMarketMaker': '做市商後台',
            'title.adminDlq': 'DLQ 後台',
            'message.open': '開啟訊息中心',
            'message.title': '訊息中心',
            'message.empty': '最近 24 小時沒有訊息。',
            'message.close': '關閉訊息'
        },
        ms: {
            'page.title': 'Admin Bursa',
            'page.subtitle': 'Konsol operator bersatu untuk dana, pasaran, risiko, pembuat pasaran dan semakan DLQ.',
            'language.label': 'Bahasa',
            'nav.clientExchange': 'Bursa Klien',
            'tab.testFunds': 'Dana Ujian',
            'tab.marketConfig': 'Konfigurasi Pasaran',
            'tab.riskParameters': 'Parameter Risiko',
            'tab.marketMakers': 'Pembuat Pasaran',
            'tab.dlq': 'DLQ',
            'section.selectedAdminPage': 'Halaman admin dipilih',
            'title.adminTestFunds': 'Admin Dana Ujian',
            'title.adminMarketConfig': 'Admin Konfigurasi Pasaran',
            'title.adminRiskParameters': 'Admin Parameter Risiko',
            'title.adminMarketMaker': 'Admin Pembuat Pasaran',
            'title.adminDlq': 'Admin DLQ',
            'message.open': 'Buka Mesej',
            'message.title': 'Mesej',
            'message.empty': 'Tiada mesej dalam 24 jam terakhir.',
            'message.close': 'Tutup mesej'
        },
        ko: {
            'page.title': '거래소 관리자',
            'page.subtitle': '자금, 시장, 리스크, 마켓메이킹, DLQ 검토를 위한 통합 운영 콘솔입니다.',
            'language.label': '언어',
            'nav.clientExchange': '클라이언트 거래소',
            'tab.testFunds': '테스트 자금',
            'tab.marketConfig': '시장 설정',
            'tab.riskParameters': '리스크 파라미터',
            'tab.marketMakers': '마켓메이커',
            'tab.dlq': 'DLQ',
            'section.selectedAdminPage': '선택한 관리 페이지',
            'title.adminTestFunds': '테스트 자금 관리',
            'title.adminMarketConfig': '시장 설정 관리',
            'title.adminRiskParameters': '리스크 파라미터 관리',
            'title.adminMarketMaker': '마켓메이커 관리',
            'title.adminDlq': 'DLQ 관리',
            'message.open': '메시지 열기',
            'message.title': '메시지',
            'message.empty': '최근 24시간 메시지가 없습니다.',
            'message.close': '메시지 닫기'
        }
    };
    let currentLanguage = localStorage.getItem(I18N_STORAGE_KEY) || 'en';
    let adminMessages = loadAdminMessages();
    const frame = document.getElementById('adminFrame');
    const titles = {
        '/admin-test-funds.html': 'title.adminTestFunds',
        '/admin-market-config.html': 'title.adminMarketConfig',
        '/admin-risk-parameters.html': 'title.adminRiskParameters',
        '/admin-market-maker.html': 'title.adminMarketMaker',
        '/admin-dlq.html': 'title.adminDlq'
    };

    function t(key) {
        return translations[currentLanguage]?.[key] || translations.en[key] || key;
    }

    function selectedTab() {
        return document.querySelector('.tab[aria-selected="true"]');
    }

    function titleKeyFor(src) {
        // Embedded admin tools may include query flags; title routing is keyed by the stable page path.
        return titles[new URL(src, window.location.origin).pathname] || 'page.title';
    }

    function applyTranslations() {
        document.documentElement.lang = currentLanguage;
        document.title = t('page.title');
        document.querySelectorAll('[data-i18n]').forEach((el) => {
            el.textContent = t(el.dataset.i18n);
        });
        document.querySelectorAll('[data-i18n-aria-label]').forEach((el) => {
            el.setAttribute('aria-label', t(el.dataset.i18nAriaLabel));
        });
        document.querySelectorAll('[data-i18n-title]').forEach((el) => {
            el.setAttribute('title', t(el.dataset.i18nTitle));
        });
        const src = selectedTab()?.dataset.src || frame.getAttribute('src');
        frame.title = t(titleKeyFor(src));
        renderAdminMessages();
    }

    function text(value) {
        return String(value ?? '').replace(/[&<>"']/g, (char) => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[char]));
    }

    function pruneAdminMessages(items) {
        const cutoff = Date.now() - ADMIN_MESSAGE_TTL_MS;
        return (items || [])
            .filter(item => item && item.createdAt >= cutoff && item.message)
            .sort((a, b) => b.createdAt - a.createdAt)
            .slice(0, ADMIN_MESSAGE_MAX_VISIBLE);
    }

    function loadAdminMessages() {
        try {
            return pruneAdminMessages(JSON.parse(localStorage.getItem(ADMIN_MESSAGE_STORAGE_KEY) || '[]'));
        } catch {
            return [];
        }
    }

    function saveAdminMessages() {
        localStorage.setItem(ADMIN_MESSAGE_STORAGE_KEY, JSON.stringify(pruneAdminMessages(adminMessages)));
    }

    function pushAdminMessage(message) {
        adminMessages = pruneAdminMessages([
            {
                id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
                message,
                createdAt: Date.now()
            },
            ...adminMessages
        ]);
        saveAdminMessages();
        renderAdminMessages();
    }

    function renderAdminMessages() {
        const badge = document.getElementById('messageBadge');
        const list = document.getElementById('messageList');
        if (!badge || !list) return;
        adminMessages = pruneAdminMessages(adminMessages);
        badge.textContent = String(adminMessages.length);
        badge.hidden = adminMessages.length === 0;
        if (adminMessages.length === 0) {
            list.innerHTML = `<div class="message-empty">${text(t('message.empty'))}</div>`;
            saveAdminMessages();
            return;
        }
        list.innerHTML = adminMessages.map(message => `
            <div class="message-item">
                <div>
                    <strong>${text(message.message)}</strong>
                    <small>${new Date(message.createdAt).toLocaleString()}</small>
                </div>
                <button type="button" data-dismiss-message="${text(message.id)}" aria-label="${text(t('message.close'))}" title="${text(t('message.close'))}">×</button>
            </div>
        `).join('');
        saveAdminMessages();
    }

    function syncFrameLanguage() {
        // The admin shell and same-origin child pages share the language key so iframe reloads keep operator locale.
        localStorage.setItem(I18N_STORAGE_KEY, currentLanguage);
        frame.src = frame.getAttribute('src');
    }

    function activateTab(tab, {persist = true} = {}) {
        document.querySelectorAll('.tab').forEach((candidate) => {
            candidate.setAttribute('aria-selected', String(candidate === tab));
        });
        const src = tab.dataset.src;
        frame.src = src;
        frame.title = t(titleKeyFor(src));
        if (persist) {
            // Persist the operator's current admin workspace so browser refresh returns to the same tool.
            localStorage.setItem(ADMIN_TAB_STORAGE_KEY, src);
        }
    }

    function restoreSelectedTab() {
        const savedSrc = localStorage.getItem(ADMIN_TAB_STORAGE_KEY);
        const savedTab = savedSrc ? document.querySelector(`.tab[data-src="${savedSrc}"]`) : null;
        if (savedTab) {
            activateTab(savedTab, {persist: false});
        }
    }

    document.querySelectorAll('.tab').forEach((tab) => {
        tab.addEventListener('click', () => activateTab(tab));
    });

    document.getElementById('language').value = currentLanguage;
    document.getElementById('language').addEventListener('change', (event) => {
        currentLanguage = event.target.value;
        applyTranslations();
        syncFrameLanguage();
    });
    document.getElementById('messageCenterToggle').addEventListener('click', () => {
        const panel = document.getElementById('messagePanel');
        panel.hidden = !panel.hidden;
        document.getElementById('messageCenterToggle').setAttribute('aria-expanded', String(!panel.hidden));
    });
    document.getElementById('messageList').addEventListener('click', (event) => {
        const button = event.target.closest('[data-dismiss-message]');
        if (!button) return;
        adminMessages = adminMessages.filter(message => message.id !== button.dataset.dismissMessage);
        saveAdminMessages();
        renderAdminMessages();
    });
    document.addEventListener('click', (event) => {
        if (!document.getElementById('messageCenter').contains(event.target)) {
            document.getElementById('messagePanel').hidden = true;
            document.getElementById('messageCenterToggle').setAttribute('aria-expanded', 'false');
        }
    });
    window.addEventListener('message', (event) => {
        // Same-origin admin iframes can publish operation results into the shell-level message center.
        if (event.origin !== window.location.origin || event.data?.type !== 'admin.message') {
            return;
        }
        pushAdminMessage(event.data.message);
    });
    restoreSelectedTab();
    applyTranslations();
</script>
</body>
</html>
