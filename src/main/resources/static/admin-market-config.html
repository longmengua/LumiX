<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Market Config</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7f4;
            --panel: #ffffff;
            --line: #cfd8d3;
            --text: #1c2520;
            --muted: #66736c;
            --accent: #116149;
            --accent-soft: #dceee7;
            --warn: #8a4b10;
            --warn-soft: #fff2d8;
            --danger: #9b1c1c;
            --danger-soft: #fee2e2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 24px;
            border-bottom: 1px solid var(--line);
            background: var(--panel);
        }

        h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
        }

        main {
            display: grid;
            grid-template-columns: minmax(320px, 1fr) 360px;
            gap: 18px;
            padding: 18px 24px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #fff;
            min-height: 34px;
            padding: 0 12px;
            font-weight: 700;
            cursor: pointer;
        }

        button:disabled {
            border-color: var(--line);
            background: #edf0ee;
            color: #84908a;
            cursor: not-allowed;
        }

        input {
            min-height: 34px;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            padding: 0 10px;
            width: 240px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--panel);
            border: 1px solid var(--line);
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            white-space: nowrap;
        }

        th {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            background: #f0f3f1;
        }

        tr {
            cursor: pointer;
        }

        tr.selected {
            background: var(--accent-soft);
        }

        .status {
            display: inline-block;
            padding: 3px 8px;
            border: 1px solid var(--line);
            background: #eef3f1;
            font-size: 12px;
            font-weight: 700;
        }

        .status.warn {
            color: var(--warn);
            background: var(--warn-soft);
            border-color: #e5bf71;
        }

        .detail {
            background: var(--panel);
            border: 1px solid var(--line);
            padding: 16px;
            min-height: 520px;
        }

        .detail h2 {
            margin: 0 0 12px;
            font-size: 18px;
        }

        .kv {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 14px;
            margin-bottom: 16px;
        }

        .kv div {
            min-width: 0;
        }

        .label {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 3px;
        }

        .value {
            overflow-wrap: anywhere;
            font-weight: 700;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 14px 0;
        }

        .notice {
            border: 1px solid #e5bf71;
            background: var(--warn-soft);
            color: var(--warn);
            padding: 10px;
            margin: 12px 0;
            line-height: 1.4;
        }

        .error {
            border: 1px solid #f2a5a5;
            background: var(--danger-soft);
            color: var(--danger);
            padding: 10px;
            margin: 12px 0;
        }

        .tiers {
            width: 100%;
            font-size: 12px;
        }

        @media (max-width: 900px) {
            header {
                align-items: flex-start;
                flex-direction: column;
            }

            main {
                grid-template-columns: 1fr;
                padding: 14px;
            }

            .toolbar {
                flex-wrap: wrap;
            }

            input {
                width: 100%;
            }

            .table-wrap {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
<header>
    <h1>Admin Market Config</h1>
    <div class="toolbar">
        <input id="filter" placeholder="Symbol filter" aria-label="Symbol filter"/>
        <button id="refresh" type="button">Refresh</button>
        <span id="mode" class="status">READ ONLY</span>
    </div>
</header>

<main>
    <section>
        <div id="error" class="error" hidden></div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Status</th>
                    <th>Base</th>
                    <th>Quote</th>
                    <th>Price Tick</th>
                    <th>Lot Size</th>
                    <th>Min Notional</th>
                    <th>Max Leverage</th>
                </tr>
                </thead>
                <tbody id="markets"></tbody>
            </table>
        </div>
    </section>

    <aside class="detail">
        <h2 id="detailTitle">No Market Selected</h2>
        <div id="detailBody"></div>
    </aside>
</main>

<script>
    const state = {
        markets: [],
        capabilities: null,
        selectedSymbol: null
    };

    const marketsEl = document.getElementById('markets');
    const detailTitle = document.getElementById('detailTitle');
    const detailBody = document.getElementById('detailBody');
    const filterEl = document.getElementById('filter');
    const errorEl = document.getElementById('error');

    document.getElementById('refresh').addEventListener('click', loadMarkets);
    filterEl.addEventListener('input', renderMarkets);

    function fmt(value) {
        return value === null || value === undefined || value === '' ? '-' : String(value);
    }

    function esc(value) {
        return fmt(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function statusClass(market) {
        return market.status === 'TRADING_ENABLED' ? 'status' : 'status warn';
    }

    async function loadMarkets() {
        errorEl.hidden = true;
        try {
            const response = await fetch('/api/admin/market-config', {
                headers: {'Accept': 'application/json'}
            });
            const payload = await response.json();
            if (!response.ok || !payload.ok) {
                throw new Error(payload.error || `HTTP ${response.status}`);
            }
            state.markets = payload.data.markets || [];
            state.capabilities = payload.data.capabilities || null;
            if (!state.selectedSymbol && state.markets.length > 0) {
                state.selectedSymbol = state.markets[0].symbol;
            }
            renderMarkets();
            renderDetail();
        } catch (error) {
            errorEl.textContent = error.message;
            errorEl.hidden = false;
        }
    }

    function renderMarkets() {
        const query = filterEl.value.trim().toUpperCase();
        const rows = state.markets
            .filter(market => !query || market.symbol.includes(query))
            .map(market => `
                <tr class="${market.symbol === state.selectedSymbol ? 'selected' : ''}" data-symbol="${market.symbol}">
                    <td>${esc(market.symbol)}</td>
                    <td><span class="${statusClass(market)}">${esc(market.status)}</span></td>
                    <td>${esc(market.baseAsset)}</td>
                    <td>${esc(market.quoteAsset)}</td>
                    <td>${esc(market.priceTick)}</td>
                    <td>${esc(market.lotSize)}</td>
                    <td>${esc(market.minNotional)}</td>
                    <td>${esc(market.maxLeverage)}</td>
                </tr>
            `)
            .join('');
        marketsEl.innerHTML = rows || '<tr><td colspan="8">No markets</td></tr>';
        marketsEl.querySelectorAll('tr[data-symbol]').forEach(row => {
            row.addEventListener('click', () => {
                state.selectedSymbol = row.dataset.symbol;
                renderMarkets();
                renderDetail();
            });
        });
    }

    function renderDetail() {
        const market = state.markets.find(item => item.symbol === state.selectedSymbol);
        if (!market) {
            detailTitle.textContent = 'No Market Selected';
            detailBody.innerHTML = '';
            return;
        }

        const disabledActions = state.capabilities?.disabledActions || [];
        detailTitle.textContent = market.symbol;
        detailBody.innerHTML = `
            <div class="kv">
                ${field('Trading Mode', market.tradingMode)}
                ${field('Session Window', market.sessionWindow)}
                ${field('Matching', market.matchingEnabled ? 'ENABLED' : 'DISABLED')}
                ${field('Market Data', market.marketDataEnabled ? 'ENABLED' : 'DISABLED')}
                ${field('Min Qty', market.minQty)}
                ${field('Max Open Orders', market.maxOpenOrders)}
                ${field('Max Order Notional', market.maxOrderNotional)}
                ${field('Max Position Notional', market.maxPositionNotional)}
                ${field('Maker Fee', market.makerFeeRate)}
                ${field('Taker Fee', market.takerFeeRate)}
                ${field('Initial Margin', market.initialMarginRate)}
                ${field('Maintenance Margin', market.maintenanceMarginRate)}
            </div>
            <div class="actions">
                <button type="button" disabled>Edit Config</button>
                <button type="button" disabled>Manual Suspension</button>
            </div>
            <div class="notice">
                Writes disabled: ${disabledActions.map(esc).join(', ')}
            </div>
            <table class="tiers">
                <thead>
                <tr>
                    <th>Tier</th>
                    <th>Max Position</th>
                    <th>Initial</th>
                    <th>Maintenance</th>
                    <th>Leverage</th>
                </tr>
                </thead>
                <tbody>
                    ${(market.riskTiers || []).map(tier => `
                        <tr>
                            <td>${esc(tier.tier)}</td>
                            <td>${esc(tier.maxPositionNotional)}</td>
                            <td>${esc(tier.initialMarginRate)}</td>
                            <td>${esc(tier.maintenanceMarginRate)}</td>
                            <td>${esc(tier.maxLeverage)}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }

    function field(label, value) {
        return `
            <div>
                <div class="label">${label}</div>
                <div class="value">${esc(value)}</div>
            </div>
        `;
    }

    loadMarkets();
</script>
</body>
</html>
