# 檔案用途：專案設定檔，說明 src/main/resources/application.yml 的用途與本機開發設定。
spring:
  application:
    name: java21-exchange
  profiles:
    active: dev

api-auth:
  # dev 預設關閉，prod profile 預設開啟；也可用 API_AUTH_ENABLED 覆蓋。
  enabled: ${API_AUTH_ENABLED:false}
  api-key-enabled: ${API_AUTH_API_KEY_ENABLED:true}
  api-key-header: ${API_AUTH_API_KEY_HEADER:X-API-Key}
  api-keys: ${API_AUTH_API_KEYS:}
  jwt-enabled: ${API_AUTH_JWT_ENABLED:true}
  jwt-hmac-secret: ${API_AUTH_JWT_HMAC_SECRET:}
  clock-skew-seconds: ${API_AUTH_CLOCK_SKEW_SECONDS:60}

security-controls:
  # 受保護 API 的安全控制基線：rate limit、IP allowlist、audit log。
  enabled: ${SECURITY_CONTROLS_ENABLED:true}
  audit-enabled: ${SECURITY_CONTROLS_AUDIT_ENABLED:true}
  rate-limit-enabled: ${SECURITY_CONTROLS_RATE_LIMIT_ENABLED:true}
  requests-per-minute: ${SECURITY_CONTROLS_REQUESTS_PER_MINUTE:120}
  max-tracked-keys: ${SECURITY_CONTROLS_MAX_TRACKED_KEYS:10000}
  ip-allowlist-enabled: ${SECURITY_CONTROLS_IP_ALLOWLIST_ENABLED:false}
  ip-allowlist: ${SECURITY_CONTROLS_IP_ALLOWLIST:}
  client-ip-header: ${SECURITY_CONTROLS_CLIENT_IP_HEADER:X-Forwarded-For}
  protected-path-patterns:
    - /api/order/**
    - /api/margin/**
    - /api/risk/**
    - /api/recovery/**
    - /api/prediction/session/**
    - /api/prediction/orders/**
    - /api/prediction/clob/**
    - /api/prediction/markets/discover
    - /api/prediction/markets/sync
    - /api/prediction/markets/sync-reset
    - /api/prediction/markets/sync-progress
    - /api/prediction/markets/retry/**
    - /api/prediction/markets/price-refresh
    - /api/prediction/ws/**
    - /api/prediction/approve/**
