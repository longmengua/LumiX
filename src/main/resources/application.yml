# 檔案用途：專案設定檔，說明 src/main/resources/application.yml 的用途與本機開發設定。
spring:
  application:
    name: java21-exchange
  profiles:
    active: dev

api-auth:
  # dev 預設關閉，prod profile 預設開啟；也可用 API_AUTH_ENABLED 覆蓋。
  enabled: ${API_AUTH_ENABLED:false}
  api-key-enabled: ${API_AUTH_API_KEY_ENABLED:true}
  api-key-header: ${API_AUTH_API_KEY_HEADER:X-API-Key}
  api-keys: ${API_AUTH_API_KEYS:}
  jwt-enabled: ${API_AUTH_JWT_ENABLED:true}
  jwt-hmac-secret: ${API_AUTH_JWT_HMAC_SECRET:}
  clock-skew-seconds: ${API_AUTH_CLOCK_SKEW_SECONDS:60}

security-controls:
  # 受保護 API 的安全控制基線：rate limit、IP allowlist、audit log。
  enabled: ${SECURITY_CONTROLS_ENABLED:true}
  audit-enabled: ${SECURITY_CONTROLS_AUDIT_ENABLED:true}
  rate-limit-enabled: ${SECURITY_CONTROLS_RATE_LIMIT_ENABLED:true}
  requests-per-minute: ${SECURITY_CONTROLS_REQUESTS_PER_MINUTE:120}
  max-tracked-keys: ${SECURITY_CONTROLS_MAX_TRACKED_KEYS:10000}
  ip-allowlist-enabled: ${SECURITY_CONTROLS_IP_ALLOWLIST_ENABLED:false}
  ip-allowlist: ${SECURITY_CONTROLS_IP_ALLOWLIST:}
  client-ip-header: ${SECURITY_CONTROLS_CLIENT_IP_HEADER:X-Forwarded-For}
  protected-path-patterns:
    - /api/order/**
    - /api/margin/**
    - /api/risk/**
    - /api/market-maker/**
    - /api/recovery/**
    - /api/ops/**
    - /api/prediction/session/**
    - /api/prediction/orders/**
    - /api/prediction/clob/**
    - /api/prediction/markets/discover
    - /api/prediction/markets/sync
    - /api/prediction/markets/sync-reset
    - /api/prediction/markets/sync-progress
    - /api/prediction/markets/retry/**
    - /api/prediction/markets/price-refresh
    - /api/prediction/ws/**
    - /api/prediction/approve/**

risk-controls:
  order-entry-halt: ${RISK_CONTROLS_ORDER_ENTRY_HALT:false}
  reduce-only-mode: ${RISK_CONTROLS_REDUCE_ONLY_MODE:false}
  withdrawal-halt: ${RISK_CONTROLS_WITHDRAWAL_HALT:false}
  liquidation-halt: ${RISK_CONTROLS_LIQUIDATION_HALT:false}
  liquidation-manual-review: ${RISK_CONTROLS_LIQUIDATION_MANUAL_REVIEW:false}
  market-maker-hedge-execution-halt: ${RISK_CONTROLS_MARKET_MAKER_HEDGE_EXECUTION_HALT:false}
  market-maker-hedge-execution-policy:
    enabled: ${RISK_CONTROLS_MARKET_MAKER_HEDGE_EXECUTION_POLICY_ENABLED:false}
    max-routed-orders-per-run: ${RISK_CONTROLS_MARKET_MAKER_HEDGE_EXECUTION_POLICY_MAX_ROUTED_ORDERS_PER_RUN:0}
    max-routed-notional-per-run: ${RISK_CONTROLS_MARKET_MAKER_HEDGE_EXECUTION_POLICY_MAX_ROUTED_NOTIONAL_PER_RUN:0}
  suspended-symbols: ${RISK_CONTROLS_SUSPENDED_SYMBOLS:}
bonus-credit:
  expiry-enabled: ${BONUS_CREDIT_EXPIRY_ENABLED:false}
  expiry-fixed-delay-ms: ${BONUS_CREDIT_EXPIRY_FIXED_DELAY_MS:300000}
  expiry-batch-size: ${BONUS_CREDIT_EXPIRY_BATCH_SIZE:500}
  eligibility:
    enabled: ${BONUS_CREDIT_ELIGIBILITY_ENABLED:false}
    allowed-symbols: ${BONUS_CREDIT_ELIGIBILITY_ALLOWED_SYMBOLS:}
    blocked-symbols: ${BONUS_CREDIT_ELIGIBILITY_BLOCKED_SYMBOLS:}
    allowed-order-types: ${BONUS_CREDIT_ELIGIBILITY_ALLOWED_ORDER_TYPES:}
    allowed-expense-accounts: ${BONUS_CREDIT_ELIGIBILITY_ALLOWED_EXPENSE_ACCOUNTS:}
  clawback-policy:
    enabled: ${BONUS_CREDIT_CLAWBACK_POLICY_ENABLED:false}
    fixed-delay-ms: ${BONUS_CREDIT_CLAWBACK_POLICY_FIXED_DELAY_MS:300000}
    campaign-id: ${BONUS_CREDIT_CLAWBACK_POLICY_CAMPAIGN_ID:}
    asset: ${BONUS_CREDIT_CLAWBACK_POLICY_ASSET:USDT}
    max-amount-per-run: ${BONUS_CREDIT_CLAWBACK_POLICY_MAX_AMOUNT_PER_RUN:0}
    ref-prefix: ${BONUS_CREDIT_CLAWBACK_POLICY_REF_PREFIX:bonus-auto-clawback}

market-maker:
  quote-repair:
    enabled: ${MARKET_MAKER_QUOTE_REPAIR_ENABLED:false}
    fixed-delay-ms: ${MARKET_MAKER_QUOTE_REPAIR_FIXED_DELAY_MS:300000}
    limit: ${MARKET_MAKER_QUOTE_REPAIR_LIMIT:50}
  hedge-execution:
    enabled: ${MARKET_MAKER_HEDGE_EXECUTION_ENABLED:false}
    fixed-delay-ms: ${MARKET_MAKER_HEDGE_EXECUTION_FIXED_DELAY_MS:300000}
    ref-prefix: ${MARKET_MAKER_HEDGE_EXECUTION_REF_PREFIX:scheduled}
    lock-enabled: ${MARKET_MAKER_HEDGE_EXECUTION_LOCK_ENABLED:false}
    lock-owner-id: ${MARKET_MAKER_HEDGE_EXECUTION_LOCK_OWNER_ID:${HOSTNAME:unknown-hedge-worker}}
    lock-ttl-ms: ${MARKET_MAKER_HEDGE_EXECUTION_LOCK_TTL_MS:30000}
    approval-required: ${MARKET_MAKER_HEDGE_EXECUTION_APPROVAL_REQUIRED:false}
    approval-token: ${MARKET_MAKER_HEDGE_EXECUTION_APPROVAL_TOKEN:}
    scheduled-approval-token: ${MARKET_MAKER_HEDGE_EXECUTION_SCHEDULED_APPROVAL_TOKEN:}
  hedge-callback:
    signature-required: ${MARKET_MAKER_HEDGE_CALLBACK_SIGNATURE_REQUIRED:false}
    signature-secret: ${MARKET_MAKER_HEDGE_CALLBACK_SIGNATURE_SECRET:}
    timestamp-tolerance-seconds: ${MARKET_MAKER_HEDGE_CALLBACK_TIMESTAMP_TOLERANCE_SECONDS:300}

market-data:
  retention:
    enabled: ${MARKET_DATA_RETENTION_ENABLED:false}
    fixed-delay-ms: ${MARKET_DATA_RETENTION_FIXED_DELAY_MS:300000}
    depth-delta: ${MARKET_DATA_RETENTION_DEPTH_DELTA:PT24H}
    trade-tape: ${MARKET_DATA_RETENTION_TRADE_TAPE:P7D}
    kline: ${MARKET_DATA_RETENTION_KLINE:P30D}

push-gateway:
  heartbeat:
    enabled: ${PUSH_GATEWAY_HEARTBEAT_ENABLED:false}
    fixed-delay-ms: ${PUSH_GATEWAY_HEARTBEAT_FIXED_DELAY_MS:30000}
  rate-limit:
    enabled: ${PUSH_GATEWAY_RATE_LIMIT_ENABLED:true}
    subscriptions-per-minute: ${PUSH_GATEWAY_RATE_LIMIT_SUBSCRIPTIONS_PER_MINUTE:60}
    max-tracked-keys: ${PUSH_GATEWAY_RATE_LIMIT_MAX_TRACKED_KEYS:10000}
    client-ip-header: ${PUSH_GATEWAY_RATE_LIMIT_CLIENT_IP_HEADER:X-Forwarded-For}

turnover:
  reconciliation:
    enabled: ${TURNOVER_RECONCILIATION_ENABLED:false}
    fixed-delay-ms: ${TURNOVER_RECONCILIATION_FIXED_DELAY_MS:300000}
    lookback-seconds: ${TURNOVER_RECONCILIATION_LOOKBACK_SECONDS:3600}
    batch-limit: ${TURNOVER_RECONCILIATION_BATCH_LIMIT:1000}

ledger:
  archive:
    hot-retention-days: ${LEDGER_ARCHIVE_HOT_RETENTION_DAYS:365}
    require-tamper-evidence-clean: ${LEDGER_ARCHIVE_REQUIRE_TAMPER_EVIDENCE_CLEAN:true}
    require-balanced-daily-report: ${LEDGER_ARCHIVE_REQUIRE_BALANCED_DAILY_REPORT:true}

finance:
  export:
    enabled: ${FINANCE_EXPORT_ENABLED:false}
    cron: "${FINANCE_EXPORT_CRON:0 30 1 * * *}"
    zone: ${FINANCE_EXPORT_ZONE:UTC}

funding-rate:
  settlements: []

mark-price-oracle:
  max-staleness-ms: ${MARK_PRICE_ORACLE_MAX_STALENESS_MS:30000}
  prices: []

risk-snapshots:
  enabled: ${RISK_SNAPSHOTS_ENABLED:false}
  cron: "${RISK_SNAPSHOTS_CRON:0 0 0 * * *}"
  zone: ${RISK_SNAPSHOTS_ZONE:UTC}

reconciliation:
  enabled: ${RECONCILIATION_ENABLED:false}
  fixed-delay-ms: ${RECONCILIATION_FIXED_DELAY_MS:300000}
  alert-on-error: ${RECONCILIATION_ALERT_ON_ERROR:true}
  alert-route: ${RECONCILIATION_ALERT_ROUTE:ops.reconciliation}

external-api:
  retry-max-attempts: ${EXTERNAL_API_RETRY_MAX_ATTEMPTS:3}
  retry-backoff-ms: ${EXTERNAL_API_RETRY_BACKOFF_MS:200}
  min-interval-ms: ${EXTERNAL_API_MIN_INTERVAL_MS:0}
  circuit-breaker-enabled: ${EXTERNAL_API_CIRCUIT_BREAKER_ENABLED:true}
  circuit-breaker-failure-threshold: ${EXTERNAL_API_CIRCUIT_BREAKER_FAILURE_THRESHOLD:5}
  circuit-breaker-open-ms: ${EXTERNAL_API_CIRCUIT_BREAKER_OPEN_MS:30000}

redis-key:
  prefix: ${REDIS_KEY_PREFIX:}
