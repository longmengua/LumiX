# ---------------------------------------------------------------------------
# Profile: dev (本機開發模式)
# - Spring Boot 在本機跑，連接 docker-compose 暴露的 MySQL:3306、Kafka:9092、Redis:6379
# ---------------------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: dev   # 啟用方式：--spring.profiles.active=dev

  # ---------------------------
  # DataSource (MySQL via JPA)
  # ---------------------------
  datasource:
    url: jdbc:mysql://localhost:3306/appdb?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    # 指向本機 localhost:3306 → docker-compose 對外映射的 MySQL
    username: appuser
    password: apppass
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop   # dev 用；prod 建議 validate 或 none + Flyway
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # ---------------------------
  # Redis (Lettuce)
  # ---------------------------
  data:
    redis:
      host: localhost
      port: 6379
      # 如有密碼: password: yourpass
      # lettuce:
      #   pool:
      #     max-active: 8
      #     max-idle: 8
      #     min-idle: 0
      #     time-between-eviction-runs: 1m

  # ---------------------------
  # JSON / 時區
  # ---------------------------
  jackson:
    time-zone: Asia/Taipei
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

  # ---------------------------
  # Kafka (本機連 docker 的映射埠)
  # 我們程式透過 KafkaTemplate 發送 Java 物件（事件/DTO），建議用 JSON Serializer
  # ---------------------------
  kafka:
    bootstrap-servers: localhost:9092
    client-id: ${spring.application.name:-app}-dev
    properties:
      request.timeout.ms: 30000
      delivery.timeout.ms: 120000
      # 允許反序列化來自我們 package 的類別（消費端）
      spring.json.trusted.packages: "com.example.exchange.*"
    producer:
      acks: all
      retries: 5
      linger-ms: 5
      batch-size: 16384
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # 用 JSON 序列化 value，才能直接發送物件（例如 TradeExecuted）
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${spring.application.name:-app}-dev-group
      auto-offset-reset: latest
      enable-auto-commit: false
      max-poll-records: 500
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # 用 JSON 反序列化 value
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        isolation.level: read_committed
        # 信任反序列化的 package（或設為 * 僅在本機開發時使用）
        spring.json.trusted.packages: "com.example.exchange.*"
        # 若使用 record type，需要 type info：預設 JsonDeserializer 會用 header 判斷類型
        spring.json.use.type.headers: true
        # 也可指定預設目標類型（單 topic 類型固定時好用）
        # spring.json.value.default.type: com.example.exchange.domain.event.TradeExecuted

  # --------------------------------
  # 排程（我們有 Snapshot/FundingRate Scheduler）
  # --------------------------------
  task:
    scheduling:
          pool:
            size: 2   # dev 小池即可

# --------------------------------
# Server 與錯誤輸出
# --------------------------------
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# --------------------------------
# Actuator（健康檢查/觀測，dev 範例）
# --------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
  endpoint:
    health:
      show-details: always

# --------------------------------
# Logging（開發時多給一點細節）
# --------------------------------
logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
    com.example.exchange: DEBUG  # 你自己的程式碼
