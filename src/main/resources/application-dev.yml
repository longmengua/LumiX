# ---------------------------------------------------------------------------
# Profile: dev (本機開發模式)
# - Spring Boot 在本機跑，連接 docker-compose 暴露的 MySQL:3306、Kafka:9092、Redis:6379
# ---------------------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: dev   # 啟用方式：--spring.profiles.active=dev

  # ---------------------------
  # DataSource (MySQL via JPA)
  # ---------------------------
  datasource:
    url: jdbc:mysql://localhost:3306/appdb?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
    # 指向本機 localhost:3306 → docker-compose 對外映射的 MySQL
    username: appuser
    password: apppass
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
#      ddl-auto: create-drop   # dev 用；prod 建議 validate 或 none + Flyway
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # ---------------------------
  # Redis (Lettuce)
  # ---------------------------
  data:
    redis:
      host: localhost
      port: 6379
      # 如有密碼: password: yourpass
      # lettuce:
      #   pool:
      #     max-active: 8
      #     max-idle: 8
      #     min-idle: 0
      #     time-between-eviction-runs: 1m

  # ---------------------------
  # JSON / 時區
  # ---------------------------
  jackson:
    time-zone: Asia/Taipei
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

  # ---------------------------
  # Kafka (本機連 docker 的映射埠)
  # 我們程式透過 KafkaTemplate 發送 Java 物件（事件/DTO），建議用 JSON Serializer
  # ---------------------------
  kafka:
    bootstrap-servers: localhost:9092
    client-id: ${spring.application.name:-app}-dev
    properties:
      request.timeout.ms: 30000
      delivery.timeout.ms: 120000
      # 允許反序列化來自我們 package 的類別（消費端）
      spring.json.trusted.packages: "com.example.exchange.*"
    producer:
      acks: all
      retries: 5
      linger-ms: 5
      batch-size: 16384
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # 用 JSON 序列化 value，才能直接發送物件（例如 TradeExecuted）
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${spring.application.name:-app}-dev-group
      auto-offset-reset: latest
      enable-auto-commit: false
      max-poll-records: 500
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # 用 JSON 反序列化 value
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        isolation.level: read_committed
        # 信任反序列化的 package（或設為 * 僅在本機開發時使用）
        spring.json.trusted.packages: "com.example.exchange.*"
        # 若使用 record type，需要 type info：預設 JsonDeserializer 會用 header 判斷類型
        spring.json.use.type.headers: true
        # 也可指定預設目標類型（單 topic 類型固定時好用）
        # spring.json.value.default.type: com.example.exchange.domain.event.TradeExecuted

  # --------------------------------
  # 排程（我們有 Snapshot/FundingRate Scheduler）
  # --------------------------------
  task:
    scheduling:
          pool:
            size: 2   # dev 小池即可

# --------------------------------
# Server 與錯誤輸出
# --------------------------------
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# --------------------------------
# Actuator（健康檢查/觀測，dev 範例）
# --------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
  endpoint:
    health:
      show-details: always

# --------------------------------
# Logging（開發時多給一點細節）
# --------------------------------
logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
    com.example.exchange: DEBUG  # 你自己的程式碼

polymarket:
  key-sync-ms: 600000
  price-refresh-ms: 5000

  chain:
    chain-id: 137
    exchangeV2: 0x4bFb41d5B3570DeFd03C39a9A4d8de6bd8B8982E
    negRiskExchangeV2: 0xC5d563A36AE78145C45A50134D48A1215220cA94
    negRiskAdapter: 0xd91E80cF2E7be2e162c6513ceD06f1dD0dA35296
    collateralToken: 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174
    conditionalTokens: 0x4D97DCd97eC945f40cF65F87097ACe5EA0476045

  gamma:
    base-url: https://gamma-api.polymarket.com

  clob:
    base-url: https://clob.polymarket.com

    # 之後填 Polymarket API Credential
    api-key: ${POLYMARKET_API_KEY:}
    api-secret: ${POLYMARKET_API_SECRET:}
    api-passphrase: ${POLYMARKET_API_PASSPHRASE:}

  relayer:
    base-url: https://relayer-v2.polymarket.com
    api-key: ${POLYMARKET_RELAYER_API_KEY:}

  wallet:
    # 平台 Polymarket 錢包
    private-key: ${POLYMARKET_PRIVATE_KEY:}
    funder-address: ${POLYMARKET_FUNDER_ADDRESS:}
    signature-type: 0

  trading:
    # 你平台加價，例如 10% = 0.10
    buy-markup-rate: 0.10

    # 賣出獲利手續費，例如 0.5% = 0.005
    sell-profit-fee-rate: 0.005

    # 最大允許滑點，例如 2% = 0.02
    max-slippage-rate: 0.02

    # 最小下單 USDT
    min-order-usdt: 1

    # 最大下單 USDT
    max-order-usdt: 1000