# 檔案用途：專案設定檔，說明 src/main/resources/application-dev.yml 的用途與本機開發設定。
# ---------------------------------------------------------------------------
# Profile: dev (本機開發模式)
# - Spring Boot 在本機跑，連接 docker-compose 暴露的 MySQL:3306、Kafka:9092、Redis:6379
# ---------------------------------------------------------------------------
spring:

  # ---------------------------
  # DataSource (MySQL via JPA)
  # ---------------------------
  datasource:
    url: jdbc:mysql://localhost:3306/appdb?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
    # 指向本機 localhost:3306 → docker-compose 對外映射的 MySQL
    username: appuser
    password: apppass
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ---------------------------
  # Redis (Lettuce)
  # ---------------------------
  data:
    redis:
      host: localhost
      port: 6379
      # 如有密碼: password: yourpass
      # lettuce:
      #   pool:
      #     max-active: 8
      #     max-idle: 8
      #     min-idle: 0
      #     time-between-eviction-runs: 1m

  # ---------------------------
  # JSON / 時區
  # ---------------------------
  jackson:
    time-zone: Asia/Taipei
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

  # ---------------------------
  # Kafka (本機連 docker 的映射埠)
  # 我們程式透過 KafkaTemplate 發送 Java 物件（事件/DTO），建議用 JSON Serializer
  # ---------------------------
  kafka:
    bootstrap-servers: localhost:9092
    client-id: ${spring.application.name:-app}-dev
    properties:
      request.timeout.ms: 30000
      delivery.timeout.ms: 120000
      # 允許反序列化來自我們 package 的類別（消費端）
      spring.json.trusted.packages: "com.example.exchange.*"
    producer:
      acks: all
      retries: 5
      linger-ms: 5
      batch-size: 16384
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # 用 JSON 序列化 value，才能直接發送物件（例如 TradeExecuted）
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${spring.application.name:-app}-dev-group
      auto-offset-reset: latest
      enable-auto-commit: false
      max-poll-records: 500
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # 用 JSON 反序列化 value
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        isolation.level: read_committed
        # 信任反序列化的 package（或設為 * 僅在本機開發時使用）
        spring.json.trusted.packages: "com.example.exchange.*"
        # 若使用 record type，需要 type info：預設 JsonDeserializer 會用 header 判斷類型
        spring.json.use.type.headers: true
        # 也可指定預設目標類型（單 topic 類型固定時好用）
        # spring.json.value.default.type: com.example.exchange.domain.event.TradeExecuted

  # --------------------------------
  # 排程（我們有 Snapshot/FundingRate Scheduler）
  # --------------------------------
  task:
    scheduling:
      pool:
        size: 2   # dev 小池即可

# --------------------------------
# Server 與錯誤輸出
# --------------------------------
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# --------------------------------
# Matching worker ownership (dev baseline)
# --------------------------------
matching-worker:
  enabled: false
  owner-id: ${MATCHING_WORKER_OWNER_ID:local-dev}
  symbols: []
  lease-ttl-ms: ${MATCHING_WORKER_LEASE_TTL_MS:30000}
  renew-interval-ms: ${MATCHING_WORKER_RENEW_INTERVAL_MS:10000}
  fence-legacy-routing: ${MATCHING_WORKER_FENCE_LEGACY_ROUTING:false}

market-data:
  retention:
    enabled: false
    fixed-delay-ms: 300000
    depth-delta: PT24H
    trade-tape: P7D
    kline: P30D

archive:
  exporter:
    enabled: false
    fixed-delay-ms: 86400000
    days-back: 1
    orders-enabled: true
    trades-enabled: true
    ledger-enabled: true

tracing:
  export:
    enabled: false
    otlp-endpoint: http://localhost:4318/v1/traces
    service-name: java21-match-hub-dev
    sample-rate: 1.0
    always-sample-critical-flows: true
    drop-health-and-metrics: true

push-gateway:
  rate-limit:
    enabled: true
    subscriptions-per-minute: 120
    max-tracked-keys: 10000
    client-ip-header: X-Forwarded-For

# --------------------------------
# Actuator（健康檢查/觀測，dev 範例）
# --------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
  endpoint:
    health:
      show-details: always

# --------------------------------
# Logging（開發時多給一點細節）
# --------------------------------
logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
    com.example.exchange: DEBUG  # 你自己的程式碼

polymarket:
  key-sync-ms: 600000
  price-refresh-ms: 5000
  approval-cache-ttl-seconds: ${POLYMARKET_APPROVAL_CACHE_TTL_SECONDS:30}

  gamma:
    base-url: https://gamma-api.polymarket.com

  clob:
    base-url: https://clob.polymarket.com

    # Polymarket CLOB API credentials。
    # 用於後端呼叫 CLOB API，例如 POST /order。
    # 注意：這不是 wallet private key。
    # 從環境變數注入，避免 secret 進入 YAML / Git。
    api-key: ${POLYMARKET_CLOB_API_KEY:}
    api-secret: ${POLYMARKET_CLOB_API_SECRET:}
    api-passphrase: ${POLYMARKET_CLOB_API_PASSPHRASE:}

  ws:
    # Polymarket user channel，只推這組 CLOB API key 對應錢包的 order / trade 更新。
    user-url: wss://ws-subscriptions-clob.polymarket.com/ws/user

    # 開發環境建議先用 POST /api/prediction/ws/user/start 手動啟動。
    user-enabled: false

    # 可選：填 condition id 才會只訂閱特定市場；空陣列代表全部個人更新。
    user-market-condition-ids: []

    # 官方 market/user channel 需要每 10 秒送一次 PING。
    ping-interval-ms: 10000
    reconnect-delay-ms: 5000

  relayer:
    # 目前 placeOrder 主流程暫時沒用到。
    # 後續如果接 Polymarket Builder / Relayer 才會用。
    base-url: https://relayer-v2.polymarket.com
    api-key: ${POLYMARKET_RELAYER_API_KEY:}

  wallet:
    # 後端平台 signer private key。
    # 不用 SDK 時，後端用這把 key 做 CLOB order EIP-712 signing。
    # polymarket.clob.api-* 必須由同一把 private key create/derive。
    # 從環境變數注入，避免 secret 進入 YAML / Git。
    private-key: ${POLYMARKET_WALLET_PRIVATE_KEY:}

    # Polymarket funder / deposit wallet address。
    # TODO:
    # 目前先保留。
    # 後續若 maker/signer/funder 拆分，需要用這個欄位。
    funder-address: ${POLYMARKET_WALLET_FUNDER_ADDRESS:}

    # Polymarket signature type。
    # 官方新 API deposit wallet flow 建議：
    # 3 = POLY_1271，funder-address 填 deposit wallet。
    # 0 = EOA，funder-address 必須是同一個 EOA。
    signature-type: ${POLYMARKET_WALLET_SIGNATURE_TYPE:3}

  chain:
    chain-id: 137
    exchange-v2: "0xE111180000d2663C0091e4f400237545B87B996B"
    neg-risk-exchange-v2: "0xe2222d279d744050d28e00520010520000310F59"
    neg-risk-adapter: "0xd91E80cF2E7be2e162c6513ceD06f1dD0dA35296"
    collateral-token: "0xC011a7E12a19f7B1f670d46F03B03f3342E82DFB"
    conditional-tokens: "0x4D97DCd97eC945f40cF65F87097ACe5EA0476045"

  trading:
    # 你平台加價，例如 10% = 0.10
    buy-markup-rate: 0.10

    # 賣出獲利手續費，例如 0.5% = 0.005
    sell-profit-fee-rate: 0.005

    # 最大允許滑點，例如 2% = 0.02
    max-slippage-rate: 0.02

    # 最小下單 USDC
    min-order-usdt: 1

    # 最大下單 USDC
    max-order-usdt: 1000

web3:
  # 後端查 allowance / approval 用。
  # 如果遇到 401 / rate limit，換成自己的 Alchemy / Infura / QuickNode。
  polygon-rpc-url: ${WEB3_POLYGON_RPC_URL:https://polygon-bor-rpc.publicnode.com}
