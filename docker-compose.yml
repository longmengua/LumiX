version: "3.9"

services:
  # -----------------------------
  # Kafka (KRaft 單節點)
  # -----------------------------
  single-kafka:
    image: bitnami/kafka:3.5.1
    container_name: single-kafka
    hostname: single-kafka
    ports:
      - "9092:9092"   # Host/外部用：localhost:9092
    environment:
      # 啟用 KRaft（無需 ZooKeeper）
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_KRAFT_CLUSTER_ID: "oU-3kfkGQyKz2hP2uj9tOg"    # 固定 UUID 亦可
      KAFKA_CFG_NODE_ID: "4"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "4@single-kafka:9093"

      # 三個 listener：外部(9092)、內部(9094)、控制器(9093)
      KAFKA_CFG_LISTENERS: "PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093"
      # 外部客戶端用 localhost:9092；容器內互連用 single-kafka:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,INTERNAL://single-kafka:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "INTERNAL"

      # 資料與 Topic 設定
      KAFKA_CFG_LOG_DIRS: "/bitnami/kafka/data"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      # 單節點必要參數（避免 __consumer_offsets 建立失敗）
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      # 預設分區數量 → 調成 3（與程式中 NewTopic(…, 3, …) 對齊）
      KAFKA_CFG_NUM_PARTITIONS: "3"
    volumes:
      - single_kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # -----------------------------
  # Redis（給 Repository 使用）
  # -----------------------------
  redis:
    image: redis:7.4-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 ping | grep PONG || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # -----------------------------
  # MySQL 8.4
  # -----------------------------
  mysql:
    image: mysql:8.4
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --skip-log-bin
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -prootpass -h 127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

# 如果要把你的 Spring Boot app 也放進來，建議加 depends_on 並等待健康檢查通過再啟動。

volumes:
  single_kafka_data:
  redis_data:
  mysql_data:
